name: Update Public Preview Images

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-preview-images-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  update-preview-images:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-preview-images'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Capture preview images
        run: npm run update-screenshots

      - name: Commit updated preview images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/preview.png public/cardlist.png public/table.png public/hierarchy.png public/map.png public/reports.png
          git diff --cached --quiet || git commit -m "chore: update public preview images from CI"
          git push

      - name: Remove update-preview-images label
        if: github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-preview-images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
