name: Screenshot Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      update-baselines:
        description: 'Update screenshot baselines and commit them'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshot-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  update-baselines:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-baselines')) ||
      (github.event_name == 'workflow_dispatch' && inputs.update-baselines)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Update screenshot baselines
        run: npm run test:screenshots:update

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[automation] Update screenshot baselines from CI'
          commit_user_name: 'LangNav Bot'
          commit_user_email: 'noreply@github.com'
          skip_dirty_check: false

      - name: Verify updated baselines pass
        run: npm run test:screenshots

      - name: Remove update-baselines label and automatically add update-preview-images
        if: github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines --add-label update-preview-images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  screenshot-tests:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'update-baselines') &&
      (github.event_name != 'workflow_dispatch' || !inputs.update-baselines)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run screenshot tests
        run: npm run test:screenshots

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshot diffs
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: screenshot-diffs
          path: test-results/
          retention-days: 30
