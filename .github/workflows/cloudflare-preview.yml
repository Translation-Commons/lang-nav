name: Cloudflare Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: cf-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CF_PROJECT: lang-nav

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run build:cf
        env:
          VITE_AMPLITUDE_API_KEY: ${{ secrets.VITE_AMPLITUDE_API_KEY }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.CF_PROJECT }} --branch=pr-${{ github.event.pull_request.number }}

      - name: Prune older preview deployments for this PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_BRANCH: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const { CF_API_TOKEN, CF_ACCOUNT_ID, PR_BRANCH, CF_PROJECT } = process.env;
            const base = `https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/deployments`;
            const headers = {
              Authorization: `Bearer ${CF_API_TOKEN}`,
              'Content-Type': 'application/json',
            };

            const callCF = async (url, init = {}) => {
              const res = await fetch(url, { ...init, headers });
              if (!res.ok) {
                throw new Error(`Cloudflare API ${init.method || 'GET'} ${url} failed: ${res.status} ${await res.text()}`);
              }
              return res.json();
            };

            const isInProgress = (d) =>
              d.latest_stage?.status === 'active' || d.latest_stage?.ended_on == null;

            const matches = [];
            for (let page = 1; ; page++) {
              const { result } = await callCF(`${base}?env=preview&per_page=25&page=${page}`);
              if (!result?.length) break;
              matches.push(
                ...result.filter((d) => d.deployment_trigger?.metadata?.branch === PR_BRANCH),
              );
            }

            if (matches.length <= 1) {
              core.info(`Nothing to prune (${matches.length} deployment(s) for ${PR_BRANCH}).`);
              return;
            }

            matches.sort((a, b) => new Date(b.created_on) - new Date(a.created_on));
            const [keep, ...toDelete] = matches;
            core.info(`Keeping newest deployment ${keep.id}; pruning ${toDelete.length} older one(s).`);

            const maxAttempts = 6;
            const delayMs = 15000;
            let deleted = 0;
            let failed = 0;
            const pending = new Map(toDelete.map((d) => [d.id, d]));

            for (let attempt = 1; attempt <= maxAttempts && pending.size > 0; attempt++) {
              const stillPending = [];
              for (const [id, d] of pending) {
                const fresh = attempt === 1 ? d : (await callCF(`${base}/${id}`)).result;
                if (isInProgress(fresh)) {
                  stillPending.push([id, fresh]);
                  continue;
                }
                try {
                  core.info(`Deleting older deployment ${id} (attempt ${attempt})`);
                  await callCF(`${base}/${id}`, { method: 'DELETE' });
                  deleted++;
                } catch (err) {
                  core.warning(`Failed to delete ${id}: ${err.message}`);
                  failed++;
                }
              }
              pending.clear();
              for (const entry of stillPending) pending.set(entry[0], entry[1]);
              if (pending.size > 0 && attempt < maxAttempts) {
                core.info(`${pending.size} still in progress, retrying in ${delayMs / 1000}s`);
                await new Promise((r) => setTimeout(r, delayMs));
              }
            }
            core.info(
              `Prune for ${PR_BRANCH}: deleted=${deleted}, skipped=${pending.size}, failed=${failed}`,
            );

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const alias = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';
            const body = [
              '### Cloudflare Pages preview',
              '',
              `- Deploy URL: ${url}/lang-nav/`,
              alias ? `- Branch alias: ${alias}/lang-nav/` : null,
              '',
              `Commit: \`${context.sha.slice(0, 7)}\``,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### Cloudflare Pages preview')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments and update PR comment
        uses: actions/github-script@v7
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_BRANCH: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const { CF_API_TOKEN, CF_ACCOUNT_ID, PR_BRANCH, CF_PROJECT } = process.env;
            const base = `https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/deployments`;
            const headers = {
              Authorization: `Bearer ${CF_API_TOKEN}`,
              'Content-Type': 'application/json',
            };

            const callCF = async (url, init = {}) => {
              const res = await fetch(url, { ...init, headers });
              if (!res.ok) {
                throw new Error(`Cloudflare API ${init.method || 'GET'} ${url} failed: ${res.status} ${await res.text()}`);
              }
              return res.json();
            };

            const isInProgress = (d) =>
              d.latest_stage?.status === 'active' || d.latest_stage?.ended_on == null;

            const matches = [];
            for (let page = 1; ; page++) {
              const { result } = await callCF(`${base}?env=preview&per_page=25&page=${page}`);
              if (!result?.length) break;
              matches.push(
                ...result.filter((d) => d.deployment_trigger?.metadata?.branch === PR_BRANCH),
              );
            }

            // Retry in-progress deployments a few times; CF refuses to delete while they run.
            const maxAttempts = 6;
            const delayMs = 15000;
            let deleted = 0;
            let skipped = 0;
            let failed = 0;
            const pending = new Map(matches.map((d) => [d.id, d]));

            for (let attempt = 1; attempt <= maxAttempts && pending.size > 0; attempt++) {
              const stillPending = [];
              for (const [id, d] of pending) {
                const fresh = attempt === 1
                  ? d
                  : (await callCF(`${base}/${id}`)).result;
                if (isInProgress(fresh)) {
                  stillPending.push([id, fresh]);
                  continue;
                }
                try {
                  core.info(`Deleting deployment ${id} (attempt ${attempt})`);
                  await callCF(`${base}/${id}`, { method: 'DELETE' });
                  deleted++;
                } catch (err) {
                  core.warning(`Failed to delete ${id}: ${err.message}`);
                  failed++;
                }
              }
              pending.clear();
              for (const entry of stillPending) pending.set(entry[0], entry[1]);
              if (pending.size > 0 && attempt < maxAttempts) {
                core.info(`${pending.size} deployment(s) still in progress, retrying in ${delayMs / 1000}s`);
                await new Promise((r) => setTimeout(r, delayMs));
              }
            }
            skipped = pending.size;

            core.info(
              `Branch ${PR_BRANCH}: deleted=${deleted}, skipped=${skipped}, failed=${failed}`,
            );
            if (skipped > 0) {
              core.warning(
                `${skipped} deployment(s) were still in progress after ${maxAttempts} attempts and were not deleted.`,
              );
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.startsWith('### Cloudflare Pages preview'),
            );
            if (!existing) return;

            const lines = [
              '### Cloudflare Pages preview',
              '',
              `Preview torn down on PR close: ${deleted} deployment(s) deleted.`,
            ];
            if (skipped > 0) {
              lines.push(`${skipped} deployment(s) were still in progress and could not be deleted.`);
            }
            if (failed > 0) {
              lines.push(`${failed} deployment(s) failed to delete; see workflow logs.`);
            }
            const body = lines.join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
